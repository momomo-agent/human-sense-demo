name: HumanSenseDemo
options:
  bundleIdPrefix: com.momomo
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
packages:
  HumanSenseKit:
    url: https://github.com/momomo-agent/HumanSenseKit.git
    from: "4.9.89"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.7.8"
targets:
  HumanSenseDemo:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: HumanSenseKit
      - package: FluidAudio
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: HumanSense
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "用于人脸追踪和注视检测"
        NSMicrophoneUsageDescription: "用于语音活动检测"
        NSSpeechRecognitionUsageDescription: "用于实时语音转文字"
        NSMotionUsageDescription: "用于检测设备姿态和行走状态"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.momomo.HumanSenseDemo
      SWIFT_VERSION: "6.2"
      TARGETED_DEVICE_FAMILY: "1"
      DEVELOPMENT_TEAM: P2GN9QW8E5
      CODE_SIGN_STYLE: Automatic
